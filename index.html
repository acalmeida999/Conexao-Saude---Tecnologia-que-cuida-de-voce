<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Conexão Saúde - login</title>
    <link rel="shortcut icon" href="./img/favicon.jpg" type="image/png">
    <link rel="stylesheet" href="./css/login.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="d-flex flex-column  justify-content-center align-items-center vh-100 " id="fundo">

    <!-- conterne toda estrutura de login -->
    <div class="d-flex flex-column justify-content-center align-items-center border border-3 cardlogin  "
        style="background-color: #fff;">

        <!-- logo -->
        <figure id="Logo_conexao_saude">
            <img src="./img/logoroxa.jfif" alt="logo escrito Conexão saude">
        </figure>

        <!-- conterne de formulario -->
        <form id="login" class="d-flex flex-column gap-3 justify-content-center align-items-center pb-1 w-100 px-3">
            <h2>Login</h2>

            <!-- E-mail -->
            <div class="input-group">
                <span class="input-group-text">
                    <i class="fa-regular fa-envelope"></i>
                </span>
                <input type="email" placeholder="Seu E-mail" class="form-control">
            </div>

            <!-- senha -->
            <div class="input-group">
                <span class="input-group-text">
                    <i class="fa-solid fa-lock"></i>
                </span>
                <input type="password" class="form-control" placeholder="Senha">
            </div>

        </form>

        <!-- conterne lembar e esqueci senha -->
       <div class="d-flex justify-content-between align-items-center w-100 px-3 pb-3">

            <!-- botao lembrar senha -->
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="lembar">
                <label class="form-check-label" for="lembar"><small>Lembrar senha</small></label>
            </div>
        </div>

        <!-- Botao de entrar  -->
        <a href="home.html"><button class="btn_login"> Entrar</button></a>

       <div class="d-flex flex-column flex-md-row gap-2 gap-md-5 my-4 text-center">

            <a href="cadastro_usuario.html" class="text-decoration-none">Criar uma Conta</a>

            <a href="#" class="text-decoration-none">Recuperar senha</a>

        </div>






    </div>









    <script src="./js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
