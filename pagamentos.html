    <main class="conteudo flex-grow-1 p-3">

         <div class="topo">
                <h1>Seja Bem-vinda</h1>
                 <div class="pesquisa-box">
                    
                     <form class="fx_pesquisa position-relative">
                          <input type="search" class="form-control ps-5 rounded-5"  placeholder="Pesquisar...">
                     </form>
                </div>
            </div>

        <div class="card p-5 rounded-5">
                <h2><i class="fa-solid fa-qrcode"></i>Pagamentos</h2>

              <label>Escolha a forma de pagamento:</label>
               <select id="metodo" onchange="mostrarMetodo()">
                  <option value="cartao">Cartão de Crédito</option>
                   <option value="cartao">Cartão de Débito</option>
               </select>

             <div id="card">
                 <input type="text" placeholder="Nome no cartão">
                 <input type="text" placeholder="Número do cartão">
                 <input type="text" placeholder="Validade (MM/AA)">
                 <input type="text" placeholder="CVV">
                 <br>
                 <button onclick="pagar()">Confirmar Pagamento</button>
             </div>
         </div> 

          <script>
              function mostrarMetodo() {
              let metodo = document.getElementById("metodo").value;
              document.getElementById("cartao").style.display = (metodo === "cartao") ? "block" : "none";
            }

           function pagar() {
             alert("Pagamento processado");
              }

         </script>

        <br>
       <div class="card p-5 rounded-5">
         <h2>Gerar QR Code</h2>
         <p>E-mail conexaosaude@saude.com.br</p>
         <p>CNPJ 00.123.456/0001-78</p>

         <input type="text" id="texto" placeholder="Digite algo (link, PIX, etc)">
         <button onclick="gerarQR()">Gerar</button>

         <div id="qrcode" style="margin-top:20px;"></div>

         <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>

         <script>
         function gerarQR() {
         const texto = document.getElementById("texto").value;

         document.getElementById("qrcode").innerHTML = "";

         new QRCode(document.getElementById("qrcode"), {
         text: texto,
         width: 200,
            height: 200
         });
         }
         </script>


         <br>
         <br>
          </div>
             <button class="save"><i class="fa-solid fa-bookmark"></i>Salvar configurações</button>
         </div>
       </div>

        <script src="./js/script.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
