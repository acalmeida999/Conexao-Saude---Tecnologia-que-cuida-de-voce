<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Médico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/cadastro_medico.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <main class="container py-4">

        <div class="card p-4 rounded-5 shadow">

            <h2 class="text-center mb-4 fw-bold">
                <i class="fa-solid fa-file-medical text-primary me-2"></i>
                Cadastro Médico
            </h2>

            <form id="formMedico">

                <!-- TIPO SANGUÍNEO -->
                <section class="mb-4">
                    <h3>Tipo Sanguíneo</h3>

                    <div class="blood-grid">
                        <button type="button" class="blood-btn" aria-label="Tipo sanguíneo O positivo">O+</button>
                        <button type="button" class="blood-btn" aria-label="Tipo sanguíneo O negativo">O-</button>
                        <button type="button" class="blood-btn" aria-label="Tipo sanguíneo A positivo">A+</button>
                        <button type="button" class="blood-btn" aria-label="Tipo sanguíneo A negativo">A-</button>
                        <button type="button" class="blood-btn" aria-label="Tipo sanguíneo B positivo">B+</button>
                        <button type="button" class="blood-btn" aria-label="Tipo sanguíneo B negativo">B-</button>
                        <button type="button" class="blood-btn" aria-label="Tipo sanguíneo AB positivo">AB+</button>
                        <button type="button" class="blood-btn" aria-label="Tipo sanguíneo AB negativo">AB-</button>
                    </div>

                    <input type="hidden" id="tipoSanguineo">
                </section>

                <hr>

                <!-- ALTURA E PESO -->
                <section class="mb-4">
                    <h3>Altura e Peso</h3>

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="altura" class="form-label">Altura</label>
                            <input id="altura" class="form-control" placeholder="Altura em metros (Ex: 1.50)">
                        </div>

                        <div class="col-md-6">
                            <label for="peso" class="form-label">Peso</label>
                            <input id="peso" class="form-control" placeholder="Peso em kg (Ex: 60)">
                        </div>
                    </div>
                </section>

                <hr>

                <!-- ALERGIAS -->
                <section class="mb-4">
                    <h3>Alergias</h3>

                    <h4>Alimentar</h4>
                    <div class="chips-box" id="alergiaAlimentarBox">
                        <button type="button" class="chip">Lactose</button>
                        <button type="button" class="chip">Glúten</button>
                        <button type="button" class="chip">Amendoim</button>
                        <button type="button" class="chip">Camarão</button>
                        <button type="button" class="chip">Ovo</button>
                        <button type="button" class="chip">Soja</button>
                    </div>

                    <div class="input-add-group">
                        <label for="novaAlergiaAlimentar" class="visually-hidden">Adicionar alergia alimentar</label>
                        <input id="novaAlergiaAlimentar" class="form-control" placeholder="Adicionar outra">
                        <button type="button" class="btn btn-outline-primary add-chip-btn"
                            aria-label="Adicionar alergia alimentar">
                            Adicionar
                        </button>
                    </div>

                    <h4 class="mt-4">Medicamentos</h4>
                    <div class="chips-box" id="alergiaMedicamentosBox">
                        <button type="button" class="chip">Dipirona</button>
                        <button type="button" class="chip">Penicilina</button>
                        <button type="button" class="chip">Ibuprofeno</button>
                        <button type="button" class="chip">Amoxicilina</button>
                        <button type="button" class="chip">AAS</button>
                        <button type="button" class="chip">Nimesulida</button>
                    </div>

                    <div class="input-add-group">
                        <label for="novaAlergiaMedicamento" class="visually-hidden">Adicionar alergia
                            medicamento</label>
                        <input id="novaAlergiaMedicamento" class="form-control" placeholder="Adicionar outra">
                        <button type="button" class="btn btn-outline-primary add-chip-btn"
                            aria-label="Adicionar alergia medicamento">
                            Adicionar
                        </button>
                    </div>

                    <h4 class="mt-4">Animais / Outros</h4>
                    <div class="chips-box" id="alergiaOutrosBox">
                        <button type="button" class="chip">Pelos de gato</button>
                        <button type="button" class="chip">Pelos de cachorro</button>
                        <button type="button" class="chip">Ácaro</button>
                        <button type="button" class="chip">Poeira</button>
                        <button type="button" class="chip">Mofo</button>
                        <button type="button" class="chip">Perfume</button>
                    </div>

                    <div class="input-add-group">
                        <label for="novaAlergiaOutros" class="visually-hidden">Adicionar alergia outros</label>
                        <input id="novaAlergiaOutros" class="form-control" placeholder="Adicionar outra">
                        <button type="button" class="btn btn-outline-primary add-chip-btn"
                            aria-label="Adicionar alergia outros">
                            Adicionar
                        </button>
                    </div>
                </section>

                <hr>

                <!-- CONTATO -->
                <section class="mb-4">
                    <h3>
                        <i class="fa-solid fa-phone-volume text-primary me-2"></i>
                        Contato de Emergência
                    </h3>

                    <div id="contatosContainer">
                        <div class="contato-card">

                            <button type="button" class="remove-contact-btn" aria-label="Remover contato">
                                <i class="fa-solid fa-xmark"></i>
                            </button>

                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label class="form-label">Nome</label>
                                    <input class="form-control nomeContato">
                                </div>

                                <div class="col-md-4">
                                    <label class="form-label">Telefone</label>
                                    <input class="form-control telefoneContato">
                                </div>

                                <div class="col-md-4">
                                    <label class="form-label">Parentesco</label>
                                    <select class="form-control parentescoContato">
                                        <option>Pai</option>
                                        <option>Mãe</option>
                                        <option>Esposa</option>
                                        <option>Marido</option>
                                        <option>Amigo(a)</option>
                                    </select>
                                </div>
                            </div>

                        </div>
                    </div>

                    <button type="button" id="addContatoBtn" class="btn btn-outline-primary mt-2 rounded-4"
                        aria-label="Adicionar contato">
                        <i class="fa-solid fa-plus me-2"></i>
                        Adicionar contato
                    </button>
                </section>

                <div class="d-grid gap-3 mt-4">
                    <button class="btn btn-primary rounded-5" type="submit">
                        Salvar Cadastro Médico
                    </button>

                    <a href="home.html" class="btn btn-outline-secondary rounded-5">
                        Pular por enquanto
                    </a>
                </div>

            </form>
        </div>

    </main>

    <script src="./js/cadastro_medico.js"></script>
</body>

</html>
