<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Conexão Saúde - Atestados</title>
    <link rel="shortcut icon" href="./img/favicon.jpg" type="image/png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/atestados.css">
    <link rel="stylesheet" href="./css/receitas_medicas.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div class="container">
        <div class="topo">
            <a href="home.html" class="btn-voltar">
                <i class="fa-solid fa-arrow-left"></i>
            </a>

            <div class="titulo-area">
                <h1>Atestados</h1>
                <p>Gerencie seus afastamentos e entregas</p>
            </div>
        </div>

        <div class="text-center mb-4">
            <button class="btn-toggle-documento" data-bs-toggle="collapse" data-bs-target="#formAtestado">
                <i class="fa-solid fa-plus"></i>
                Novo Atestado
            </button>
        </div>

        <div class="collapse" id="formAtestado">
            <section class="card-form">
                <div class="acoes-upload">
                    <button class="acao-btn">
                        <i class="fa-solid fa-camera"></i>
                        Tirar Foto do Atestado
                    </button>

                    <button class="acao-btn">
                        <i class="fa-solid fa-folder"></i>
                        Anexar PDF / Imagem
                    </button>
                </div>

                <div class="dropzone">
                    <i class="fa-solid fa-upload"></i>
                    <p>Arraste aqui o arquivo</p>
                </div>

                <div class="form-grid">
                    <input class="campo" id="medico" type="text" placeholder="Nome do Médico">
                    <input class="campo" id="especialidade" type="text" placeholder="Especialidade">
                    <input class="campo" id="cid" type="text" placeholder="CID / Motivo">

                    <label>Afastamento até</label>
                    <input class="campo" id="afastamento" type="date">

                    <textarea id="observacoes" placeholder="Observações"></textarea>
                </div>

                <button class="btn-salvar" id="salvarAtestado">Salvar Atestado</button>
            </section>
        </div>

        <section class="lista">
            <h2>Meus Atestados</h2>

            <div class="filtro-documentos">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Buscar por médico ou CID">
            </div>

            <div id="listaAtestados">
                <div class="documento-card">
                    <div class="preview">
                        <i class="fa-solid fa-file-circle-check"></i>
                    </div>

                    <div class="documento-info">
                        <h3>Atestado Médico</h3>

                        <p>Emitido por: Dra. Ana Souza</p>

                        <p class="especialidade">
                            <i class="fa-solid fa-stethoscope"></i>
                            Clínico Geral
                        </p>

                        <p>
                            <i class="fa-solid fa-notes-medical"></i>
                            CID: J11 - Gripe
                        </p>

                        <p>
                            <i class="fa-regular fa-calendar"></i>
                            Afastamento até: 05/05/2026
                        </p>

                        <p class="entrega-rh">
                            <i class="fa-regular fa-calendar-check"></i>
                            Entregue em: 02/05/2026
                        </p>

                        <p class="rh-destino">
                            <i class="fa-solid fa-user-tie"></i>
                            Recebido por: Mariana - RH
                        </p>

                        <div class="acoes-card">
                            <button>
                                <i class="fa-solid fa-eye"></i>
                                Ver
                            </button>

                            <button>
                                <i class="fa-solid fa-building-user"></i>
                                Entregue ao RH
                            </button>

                            <button>
                                <i class="fa-solid fa-share-nodes"></i>
                                Compartilhar
                            </button>

                            <button>
                                <i class="fa-solid fa-trash"></i>
                                Excluir
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- MODAL RH -->
    <div class="modal fade" id="modalRH" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5>Registrar entrega ao RH</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <input type="date" id="dataEntrega" class="campo mb-3">
                    <input type="text" id="recebidoPor" class="campo" placeholder="Quem recebeu">
                </div>

                <div class="modal-footer">
                    <button class="btn btn-success" id="confirmarEntrega">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="./js/atestados.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
