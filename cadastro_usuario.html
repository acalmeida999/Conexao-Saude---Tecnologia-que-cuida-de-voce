<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Conexão Saúde - Cadastro</title>
    <link rel="shortcut icon" href="./img/favicon.jpg" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/login.css">
    <link rel="stylesheet" href="./css/cadastro.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>
 
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8 col-xl-6">

                <div class="card p-4 rounded-5 shadow">
                    <h3 class="text-center mb-4 fw-bold">Cadastro de Usuário</h3>

                    <form>

                        <div class="row">

                            <div class="col-12">
                                <h5 class="mb-3">
                                    <i class="fa-solid fa-address-card"></i>
                                    Informações pessoais
                                </h5>
                            </div>

                            <!-- Nome -->
                            <div class="col-md-12 mb-3">
                                <label class="form-label">Nome completo *</label>
                                <input type="text" id="nome" class="form-control" required>
                            </div>

                            <!-- Nome social -->
                            <div class="col-md-12 mb-3">
                                <label class="form-label">Nome social (opcional)</label>
                                <input type="text" id="nome_social" class="form-control">
                            </div>

                            <!-- Data nascimento -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Data de nascimento *</label>
                                <input type="date" id="data_nascimento" class="form-control" required>
                            </div>

                            <!-- Telefone -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Telefone</label>
                                <input type="tel" id="telefone" class="form-control" placeholder="(00) 00000-0000">
                            </div>

                            <!-- Sexo biológico -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Sexo biológico</label>
                                <select id="sexo_biologico" class="form-select">
                                    <option value="">Selecione</option>
                                    <option value="feminino">Feminino</option>
                                    <option value="masculino">Masculino</option>
                                    <option value="intersexo">Intersexo</option>
                                    <option value="nao_informar">Prefiro não informar</option>
                                </select>
                            </div>

                            <!-- Identidade de gênero -->
                            <div class="col-md-6 mb-5">
                                <label class="form-label">Identidade de gênero</label>
                                <select id="genero" class="form-select">
                                    <option value="">Selecione</option>
                                    <option value="mulher">Mulher</option>
                                    <option value="homem">Homem</option>
                                    <option value="mulher_trans">Mulher Trans </option>
                                    <option value="homem_trans">Homem Trans</option>
                                    <option value="nao_binario">Não binário</option>
                                    <option value="outro">Outro</option>
                                    <option value="nao_informar">Prefiro não informar</option>
                                </select>
                            </div>

                            <hr>

                            <div class="col-12 mt-4">
                                <h5 class="mb-3">
                                    <i class="fa-solid fa-house-chimney-user"></i>
                                    Endereço
                                </h5>

                            </div>
                            <!-- CEP -->
                            <div class="col-md-4 mb-3">
                                <label class="form-label">CEP</label>
                                <input type="text" id="cep" class="form-control" placeholder="00000-000">
                            </div>


                            <!-- Rua -->
                            <div class="col-md-10 mb-3">
                                <label class="form-label">Rua / Logradouro</label>
                                <input type="text" id="rua" class="form-control" placeholder="Nome da rua">
                            </div>

                            <!-- Número -->
                            <div class="col-md-2 mb-3">
                                <label class="form-label">Número</label>
                                <input type="text" id="numero_casa" class="form-control">
                            </div>

                            <!-- Complemento -->
                            <div class="col-md-5 mb-3">
                                <label class="form-label">Complemento</label>
                                <input type="text" id="complemento" class="form-control"
                                    placeholder="Apartamento, bloco, etc">
                            </div>

                            <!-- Bairro -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Bairro</label>
                                <input type="text" id="bairro" class="form-control">
                            </div>

                            <!-- Cidade -->
                            <div class="col-md-8 mb-5">
                                <label class="form-label">Cidade</label>
                                <input type="text" id="cidade" class="form-control">
                            </div>


                            <!-- Estado -->
                            <div class="col-md-3 mb-3">
                                <label class="form-label">Estado</label>
                                <input type="text" id="estado" class="form-control">

                            </div>

                            <hr>

                            <div class="col-12 mt-3">
                                <h5 class="mb-3">
                                    <i class="fa-solid fa-envelope"></i>
                                    Dados de acesso

                                </h5>
                            </div>

                            <!-- Email -->
                            <div class="col-md-12 mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" id="email" class="form-control">
                            </div>

                            <!-- Confirmar email -->
                            <div class="col-md-12 mb-3">
                                <label class="form-label">Confirmar email</label>
                                <input type="email" id="confirmar_email" class="form-control">
                            </div>

                            <!-- Senha -->
                            <div class="col-md-6 mb-2">
                                <label class="form-label">Senha</label>
                                <input type="password" id="senha" class="form-control">
                            </div>

                            <!-- Confirmar senha -->
                            <div class="col-md-6 mb-2">
                                <label class="form-label">Confirmar senha</label>
                                <input type="password" id="confirmar_senha" class="form-control">
                            </div>

                        </div>

                         <a href="./bem_vindo.html" class="btn btn-primary w-100 mt-3">
                            Cadastrar
                        </a>

                    </form>
                </div>

            </div>


        </div>
    </div>




    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
