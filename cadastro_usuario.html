<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Conexão Saúde - Cadastro</title>

    <link rel="shortcut icon" href="./img/favicon.jpg" type="image/png">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/login.css">
    <link rel="stylesheet" href="./css/cadastro.css">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <main>

        <div class="container mt-4">
            <div class="row justify-content-center">
                <div class="col-12 col-md-10 col-lg-8">

                    <div class="card p-4 rounded-5 shadow">
                        <h1 class="text-center mb-4 fw-bold h3">Cadastro de Usuário</h1>

                        <form>

                            <div class="row">

                                <!-- ================= INFORMAÇÕES ================= -->
                                <div class="col-12">
                                    <h2 class="mb-3 h5">
                                        <i class="fa-solid fa-address-card"></i>
                                        Informações pessoais
                                    </h2>
                                </div>

                                <div class="col-md-12 mb-3">
                                    <label for="nome" class="form-label">Nome completo *</label>
                                    <input type="text" id="nome" class="form-control" required aria-required="true">
                                </div>

                                <div class="col-md-12 mb-3">
                                    <label for="nome_social" class="form-label">Nome social (opcional)</label>
                                    <input type="text" id="nome_social" class="form-control">
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label for="data_nascimento" class="form-label">Data de nascimento *</label>
                                    <input type="date" id="data_nascimento" class="form-control" required>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label for="telefone" class="form-label">Telefone</label>
                                    <input type="tel" id="telefone" class="form-control" placeholder="(00) 00000-0000"
                                        aria-label="Telefone com DDD">
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label for="sexo_biologico" class="form-label">Sexo biológico</label>
                                    <select id="sexo_biologico" class="form-select">
                                        <option value="">Selecione</option>
                                        <option value="feminino">Feminino</option>
                                        <option value="masculino">Masculino</option>
                                        <option value="intersexo">Intersexo</option>
                                        <option value="nao_informar">Prefiro não informar</option>
                                    </select>
                                </div>

                                <div class="col-md-6 mb-5">
                                    <label for="genero" class="form-label">Identidade de gênero</label>
                                    <select id="genero" class="form-select">
                                        <option value="">Selecione</option>
                                        <option value="mulher">Mulher</option>
                                        <option value="homem">Homem</option>
                                        <option value="mulher_trans">Mulher Trans</option>
                                        <option value="homem_trans">Homem Trans</option>
                                        <option value="nao_binario">Não binário</option>
                                        <option value="outro">Outro</option>
                                        <option value="nao_informar">Prefiro não informar</option>
                                    </select>
                                </div>

                                <hr>

                                <!-- ================= ENDEREÇO ================= -->
                                <div class="col-12 mt-4">
                                    <h2 class="mb-3 h5">
                                        <i class="fa-solid fa-house-chimney-user"></i>
                                        Endereço
                                    </h2>
                                </div>

                                <div class="col-md-4 mb-3">
                                    <label for="cep" class="form-label">CEP</label>
                                    <input type="text" id="cep" class="form-control" placeholder="00000-000">
                                </div>

                                <div class="col-md-10 mb-3">
                                    <label for="rua" class="form-label">Rua / Logradouro</label>
                                    <input type="text" id="rua" class="form-control" placeholder="Nome da rua">
                                </div>

                                <div class="col-md-2 mb-3">
                                    <label for="numero_casa" class="form-label">Número</label>
                                    <input type="text" id="numero_casa" class="form-control">
                                </div>

                                <div class="col-md-5 mb-3">
                                    <label for="complemento" class="form-label">Complemento</label>
                                    <input type="text" id="complemento" class="form-control"
                                        placeholder="Apartamento, bloco, etc">
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label for="bairro" class="form-label">Bairro</label>
                                    <input type="text" id="bairro" class="form-control">
                                </div>

                                <div class="col-md-8 mb-5">
                                    <label for="cidade" class="form-label">Cidade</label>
                                    <input type="text" id="cidade" class="form-control">
                                </div>

                                <div class="col-md-4 mb-3">
                                    <label for="estado" class="form-label">Estado</label>
                                    <input type="text" id="estado" class="form-control">
                                </div>

                                <hr>

                                <!-- ================= ACESSO ================= -->
                                <div class="col-12 mt-3">
                                    <h2 class="mb-3 h5">
                                        <i class="fa-solid fa-envelope"></i>
                                        Dados de acesso
                                    </h2>
                                </div>

                                <div class="col-md-12 mb-3">
                                    <label for="email" class="form-label">Email</label>
                                    <input type="email" id="email" class="form-control">
                                </div>

                                <div class="col-md-12 mb-3">
                                    <label for="confirmar_email" class="form-label">Confirmar email</label>
                                    <input type="email" id="confirmar_email" class="form-control">
                                </div>

                                <div class="col-md-6 mb-2">
                                    <label for="senha" class="form-label">Senha</label>
                                    <input type="password" id="senha" class="form-control">
                                </div>

                                <div class="col-md-6 mb-2">
                                    <label for="confirmar_senha" class="form-label">Confirmar senha</label>
                                    <input type="password" id="confirmar_senha" class="form-control">
                                </div>

                            </div>

                            <!-- BOTÃO CORRETO -->
                            <button type="button" onclick="window.location.href='bem_vindo.html'"
                                class="btn btn-primary w-100 mt-3">
                                Cadastrar
                            </button>

                        </form>
                    </div>

                </div>
            </div>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
